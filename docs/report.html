## 1. Contexte du projet
Le projet **SOUK ✦** est une plateforme révolutionnaire de commerce électronique centralisée (**Marketplace**) combinée à une solution **SaaS Multi-tenant**. Elle a été conçue pour répondre aux défis de la digitalisation de l'artisanat et du commerce de proximité au Maroc.

**SOUK ✦** permet à tout artisan, créateur ou commerçant de générer instantanément sa propre boutique en ligne personnalisée via une URL unique (ex: \`souk.ma/store/artisan-atlas\`), sans aucune connaissance technique préalable. En intégrant l'Intelligence Artificielle au cœur de l'onboarding, la plateforme offre des outils d'une simplicité et d'un luxe inégalés, permettant aux vendeurs de se concentrer sur leur métier tout en bénéficiant d'une présence digitale d'élite.

---

## 2. Acteurs et rôles
Le système repose sur une structure tripartie sophistiquée, garantissant une séparation claire des responsabilités et une sécurité maximale.

### 2.1 Équipe Interne (SOUK Staff)
L'administration est divisée en départements opérationnels avec un système de **Role-Based Access Control (RBAC)** granulaire :
*   👑 **SuperAdmin** : Détenteur des pleins pouvoirs. Supervise les équipes, configure les paramètres globaux du SaaS, gère les rôles/permissions et accède aux logs d'audit.
*   🛡️ **Équipe Modération** : Filtre et valide les nouvelles boutiques. Responsable de la qualité du contenu et de la suspension des comptes non conformes.
*   💰 **Équipe Finance** : Gère les flux monétaires, valide les abonnements aux forfaits (Gratuit, Pro, Premium), supervise les commissions et les paiements vendeurs.
*   🚚 **Équipe Livraison / Logistique** : Supervise le statut des expéditions, gère les zones de livraison et coordonne les partenaires de transport locaux.
*   🛠️ **Équipe Système / Support** : Assure la maintenance technique, le support utilisateur et la configuration des infrastructures.

### 2.2 Vendeurs (Tenants)
*   🏪 **Vendeur (SaaS User)** : Entrepreneur gérant son espace de vente. Il dispose d'un tableau de bord complet pour piloter son inventaire, ses commandes, son design de boutique et ses analytics. Il peut exploiter l'IA pour générer ses fiches produits et son identité visuelle.

### 2.3 Clients (Acheteurs)
*   👤 **Client Final** : Utilisateur de la marketplace. Il bénéficie d'une expérience d'achat fluide, suit ses boutiques favorites, gagne des points de fidélité et interagit directement avec les vendeurs via le chat intégré.

---

## 3. Fonctionnalités détaillées
La plateforme SOUK ✦ se distingue par un ensemble de fonctionnalités innovantes réparties en piliers stratégiques.

### 3.1. Intelligence Artificielle (AI Suite)
*   ✨ **AI Store Creator** : Génération automatique de l'identité de marque (Logo, bannières, palettes de couleurs, slogans) basée sur une simple description de projet.
*   📝 **AI Product Optimizer** : Création assistée de fiches produits SEO-friendly avec génération de titres accrocheurs et de descriptions "Storytelling".
*   🔍 **Smart Search Engine** : Moteur de recherche sémantique utilisant le Traitement du Langage Naturel (NLP) pour comprendre l'intention réelle de l'acheteur.

### 3.2. Architecture SaaS & Multi-tenancy
*   🏗️ **Isolation Totale des Données** : Utilisation du \`TenantScope\` pour garantir qu'un vendeur ne voit jamais les données d'un concurrent.
*   🎨 **Customization Engine** : Éditeur de thème en temps réel (Live Preview) permettant de modifier l'apparence de la boutique sans coder.
*   📊 **Analytics Dashboard** : Rapports détaillés sur le trafic, les ventes, les produits les plus aimés et les performances globales.

### 3.3. Commerce Social & Engagement
*   💬 **Real-time Messaging** : Chat bidirectionnel avec support multimédia pour faciliter la négociation et le support client.
*   🤝 **Social Hub** : Système de "Follow" pour les boutiques et "Like" pour les produits, favorisant la récurrence d'achat.
*   🔔 **Omni-channel Notifications** : Alertes en temps réel (In-app, Email) pour les commandes, paiements et nouveaux messages.

### 3.4. Gestion Administrative & Sécurité (RBAC)
*   🏢 **Team Management** : Organisation du staff par équipes avec supervision hiérarchique par les SuperAdmins.
*   🔑 **Permission-based Security** : Chaque action sensible (ex: valider un remboursement) est soumise à une permission spécifique.
*   📑 **Audit Trail** : Journalisation exhaustive de toutes les actions administratives pour garantir la traçabilité.

### 3.5. Expérience Client Premium
*   🛒 **Smart Checkout** : Tunnel d'achat optimisé avec gestion des points de fidélité et calcul dynamique des frais de livraison.
*   💎 **Loyalty Program** : Système de points accumulables à chaque achat, convertibles en remises immédiates.
*   🚀 **Affiliate Engine** : Permet aux clients de devenir ambassadeurs et de gagner des commissions sur les ventes générées par leurs liens de partage.


## 4. Architecture technique
La solution SOUK repose sur une architecture moderne, découplée et hautement sécurisée.

### 4.1. Stack Technologique
* **Frontend** :
  * **React 18** avec **Vite** pour un bundling ultra-rapide.
  * **Context API** pour la gestion d'état globale (Auth, Panier, Admin).
  * **Tailwind CSS** pour une interface responsive et moderne.
* **Backend** :
  * **Laravel 11 (PHP 8.2+)** : Framework robuste pour les API REST.
  * **MySQL** : Base de données relationnelle pour la persistence des données.
* **Services Tiers** :
  * **OpenAI / Gemini API** : Pour les fonctionnalités de génération par IA.
  * **JWT (Tymon/jwt-auth)** : Sécurisation des échanges API via tokens.

### 4.2. Sécurité et Contrôle d'Accès
* **Authentification Multi-Rôle** : Gestion séparée des types d'utilisateurs (Client, Vendeur, Admin Staff) via des gardes (guards) Laravel dédiés.
* **Middleware \`CheckPermission\`** : Validation dynamique des droits d'accès basée sur les permissions stockées en base de données pour les équipes administratives.
* **Isolation Multi-tenant (TenantScope)** : Utilisation de Scopes Eloquent pour garantir que chaque vendeur ne puisse accéder qu'à ses propres données (Produits, Commandes, Analytics).
* **Validation des Données** : Utilisation systématique de \`FormRequest\` pour la sanitisation et la validation des entrées utilisateur.

## 8. Contraintes techniques et sécurité
Le projet SOUK ✦ impose des normes strictes pour garantir l'intégrité des transactions et la confidentialité des données multi-tenants.

### 8.1. Sécurité de l'Authentification (JWT)
*   🛡️ **Multi-Guard Strategy** : Utilisation de gardes Laravel distincts pour \`staff\`, \`vendors\`, et \`clients\`. Chaque type d'utilisateur possède un espace de token isolé.
*   🔑 **RBAC Dynamique** : Les permissions ne sont pas "hard-coded" mais vérifiées dynamiquement via le middleware \`CheckPermission\` qui interroge la relation \`Team -> Role -> Permission\`.
*   🔒 **Password Hashing** : Utilisation de l'algorithme Argon2id (via Laravel Bcrypt/Hash) pour une résistance maximale aux attaques par force brute.

### 8.2. Isolation Multi-tenant (Data Privacy)
*   🏗️ **Global Scoping** : Application systématique du \`TenantScope\` au niveau des modèles Eloquent. Toute requête \`Product::all()\` est automatiquement filtrée par le \`user_id\` du vendeur connecté.
*   📂 **Media Isolation** : Les fichiers (logos, images produits) sont stockés dans des répertoires structurés par tenant (\`storage/app/public/tenants/{tenant_id}/...\`).

### 8.3. Intégration IA & Performance
*   🤖 **Rate Limiting** : Limitation des appels aux API OpenAI/Gemini pour maîtriser les coûts et éviter les abus.
*   ⚡ **Vite Optimization** : Utilisation du code-splitting et du lazy loading pour garantir un temps de chargement inférieur à 2 secondes sur les dashboards.
